<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Request ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🥺 Will You Go On A Date With Me?</h1>

        <div class="buttons">
            <button id="yes">YES ❤️</button>
            <button id="no">NO 😒</button>
        </div>

        <div id="formSection">

    <h2>🎉 Date Mode Unlocked 🎉</h2>

    <form id="dateForm">

        <label>📅 Select a Date</label>
        <input type="date" id="date" required>

        <label>⏰ Preferred Time</label>
        <input type="time" id="time" required>

        <label>📍 Preferred Location?</label>
        <select id="location" required>
            <option value="">Choose a location</option>
            <option>Cinema 🎬</option>
            <option>Restaurant 🍽️</option>
            <option>Beach 🏖️</option>
            <option>Park 🌳</option>
            <option>Coffee Shop ☕</option>
            <option>Mall 🛍️</option>
        </select>

        <h3>😋 Choose Your Favourite Food</h3>
            <p class="food-note"> Select a meal that tastes better like You ❤️</p>

        <div class="food-grid">

    <label class="food-card">
        <input type="radio" name="food" value="Pizza">
        <img src="images/m1.jpg" alt="Pizza">
        <p> 🍕 Pizza</p>
    </label>

    <label class="food-card">
        <input type="radio" name="food" value="Jollof Rice">
        <img src="images/m2.webp" alt="Jollof Rice">
        <p>🍛 Jollof Rice</p>
    </label>

    <label class="food-card">
        <input type="radio" name="food" value="Banku & Tilapia">
        <img src="images/m4.jpg" alt="Banku and Tilapia">
        <p>🐟 Banku & Tilapia</p>
    </label>

     <label class="food-card">
        <input type="radio" name="food" value="Burger">
        <img src="images/m5.jpg" alt="Burger">
        <p>🍔 Burger</p>
    </label>

    <label class="food-card">
        <input type="radio" name="food" value="Fufu & Light Soup">
        <img src="images/m6.jpg" alt="Fufu and Light Soup">
        <p>🍲 Fufu & Light Soup</p>
    </label>
   

    <label class="food-card">
        <input type="radio" name="food" value="Seafood">
        <img src="images/m8.jpg" alt="Seafood">
        <p> 🦞 Seafood</p>
    </label>


    <label class="food-card">
        <input type="radio" name="food" value="Shawarma">
        <img src="images/m9.avif" alt="Shawarma">
        <p>🌯 Shawarma</p>
    </label>

    </div>

        <button type="submit" class="submitBtn">
            Submit Application ❤️
        </button>

    </form>

</div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
